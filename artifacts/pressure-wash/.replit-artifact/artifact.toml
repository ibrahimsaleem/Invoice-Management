kind = "web"
previewPath = "/"
title = "Pressure Wash Manager"
version = "1.0.0"
id = "artifacts/pressure-wash"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23025

[services.development]
run = "pnpm --filter @workspace/pressure-wash run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pressure-wash", "run", "build" ]
publicDir = "artifacts/pressure-wash/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23025"
BASE_PATH = "/"
